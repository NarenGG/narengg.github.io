<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naren Ganesh</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* CANVAS BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("columbia-campus.jpg") center/cover no-repeat;
  z-index: 9999;
  animation: introAnim 2.5s forwards;
}

@keyframes introAnim {
  0% { opacity: 1; filter: blur(0); }
  100% { opacity: 0; filter: blur(40px); visibility: hidden; }
}

/* MAIN CARD */
.main-card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;
  margin: 40px auto;
  max-width: 950px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  flex: 1;
}

.header-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.header-right img {
  height: 90px;   /* ✅ FIXED: scales nicely */
  width: auto;
}

/* TEXT */
h1 {
  font-size: 2.8rem;
  margin-bottom: 10px;
}

h2 {
  margin-top: 35px;
  border-bottom: 2px solid #ccc;
}

/* SCHOOL ROW */
.school {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 15px 0;
  cursor: pointer;
}

.logo-box {
  width: 45px;
  height: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-box img {
  max-width: 100%;
  max-height: 100%;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.overlay.active {
  opacity: 1;
  pointer-events: all;
}

.overlay-box {
  background: white;
  padding: 30px;
  border-radius: 15px;
  max-width: 420px;
}

/* POSTER */
.poster img {
  width: 70%;
  display: block;
  margin: 20px auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div id="intro"></div>

<div class="main-card">

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>Naren Ganesh</h1>
    <p>Electrical Engineering @ Columbia • Researcher • Debater</p>
  </div>

  <div class="header-right">
    <img src="columbia-engineering-logo.png">
  </div>
</div>

<h2>About</h2>
<p>
Computational electromagnetics, photonic time crystals, and thermal radiation.
</p>

<h2>Education</h2>

<div class="school" onclick="openOverlay('columbia')">
  <div class="logo-box">
    <img src="columbia_logo.png">
  </div>
  <strong>Columbia University — Electrical Engineering</strong>
</div>

<div class="school" onclick="openOverlay('tams')">
  <div class="logo-box">
    <img src="tams_logo.png">
  </div>
  <strong>Texas Academy of Math and Science</strong>
</div>

<h2>Research Poster</h2>
<div class="poster">
  <img src="uta-poster-preview.png">
</div>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeOverlay(event)">
  <div class="overlay-box" id="overlayContent"></div>
</div>

<script>
/* OVERLAY FIX */
function openOverlay(type) {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('overlayContent');

  if(type === 'columbia') {
    content.innerHTML = `
      <h3>Columbia University</h3>
      <p>C. Prescott Davis Scholar (Top ~1%)</p>
      <p>B.S. Electrical Engineering</p>
      <p>Minors: OR, Hispanic Studies</p>
    `;
  }

  if(type === 'tams') {
    content.innerHTML = `
      <h3>TAMS</h3>
      <p>4.0 GPA</p>
      <p>Coursework: PDEs, ODEs, Complex Analysis</p>
    `;
  }

  overlay.classList.add('active');
}

function closeOverlay(e) {
  if(e.target.id === "overlay") {
    document.getElementById('overlay').classList.remove('active');
  }
}

/* TRUE SPRING PHYSICS */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];
let spacing = 40;

for(let i=0;i<canvas.width/spacing;i++){
  nodes.push({
    x: i*spacing,
    y: canvas.height/2,
    vy: 0
  });
}

let scrollForce = 0;

window.addEventListener("scroll", () => {
  scrollForce += window.scrollY * 0.0005;
});

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<nodes.length;i++){
    let n = nodes[i];

    let targetY = canvas.height/2 + Math.sin(i + scrollForce) * 50;

    let force = (targetY - n.y) * 0.1;
    n.vy += force;
    n.vy *= 0.9;
    n.y += n.vy;
  }

  ctx.beginPath();
  for(let i=0;i<nodes.length;i++){
    let n = nodes[i];
    if(i===0) ctx.moveTo(n.x,n.y);
    else ctx.lineTo(n.x,n.y);
  }
  ctx.strokeStyle = "#4285f4";
  ctx.lineWidth = 2;
  ctx.stroke();

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
