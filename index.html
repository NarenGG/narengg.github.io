<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naren Ganesh</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  overflow-x: hidden;
}

/* SPRING BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("columbia-campus.jpg") center/cover no-repeat;
  z-index: 9999;
  animation: introAnim 2.5s forwards;
}

@keyframes introAnim {
  0% { filter: blur(0); opacity: 1; }
  100% { filter: blur(50px); opacity: 0; visibility: hidden; }
}

/* MAIN CARD */
.main-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;
  margin: 40px auto;
  max-width: 950px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  max-width: 70%;
}

.header-right img {
  width: 120px;
  height: auto;
}

/* TEXT */
h1 { font-size: 2.8rem; }
h2 { margin-top: 35px; border-bottom: 2px solid #ccc; }

/* SCHOOL ROW */
.school {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 15px 0;
  cursor: pointer;
}

.school img {
  width: 45px;
}

/* OVERLAY DROPDOWN */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.overlay.active {
  opacity: 1;
  pointer-events: all;
}

.overlay-box {
  background: white;
  padding: 30px;
  border-radius: 15px;
  max-width: 400px;
}

/* POSTER */
.poster img {
  width: 75%;
  display: block;
  margin: 20px auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div id="intro"></div>

<div class="main-card">

<div class="header">
  <div class="header-left">
    <h1>Naren Ganesh</h1>
    <p>Electrical Engineering @ Columbia • Researcher • Debater</p>
  </div>
  <div class="header-right">
    <img src="columbia-engineering-logo.png">
  </div>
</div>

<h2>About</h2>
<p>
Computational electromagnetics, photonic time crystals, and thermal radiation.
</p>

<h2>Education</h2>

<div class="school" onclick="openOverlay('columbia')">
  <img src="columbia_logo.png">
  <strong>Columbia University — Electrical Engineering</strong>
</div>

<div class="school" onclick="openOverlay('tams')">
  <img src="tams_logo.png">
  <strong>Texas Academy of Math and Science</strong>
</div>

<h2>Research Poster</h2>
<div class="poster">
  <img src="uta-poster-preview.png">
</div>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeOverlay()">
  <div class="overlay-box" id="overlayContent"></div>
</div>

<script>
/* OVERLAY CONTENT */
function openOverlay(type) {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('overlayContent');

  if(type === 'columbia') {
    content.innerHTML = `
      <h3>Columbia University</h3>
      <p>C. Prescott Davis Scholar (Top ~1%)</p>
      <p>B.S. Electrical Engineering</p>
      <p>Minors: OR, Hispanic Studies</p>
    `;
  }

  if(type === 'tams') {
    content.innerHTML = `
      <h3>TAMS</h3>
      <p>4.0 GPA</p>
      <p>Coursework: PDEs, ODEs, Complex Analysis</p>
    `;
  }

  overlay.classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

/* SPRING PHYSICS BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let springs = [];

for(let i=0;i<30;i++){
  springs.push({
    x: i*50,
    y: canvas.height/2,
    baseY: canvas.height/2
  });
}

window.addEventListener("scroll", () => {
  let force = window.scrollY * 0.05;
  springs.forEach((s,i)=>{
    s.y = s.baseY + Math.sin(i + force) * 40;
  });
});

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  for(let i=0;i<springs.length;i++){
    let s = springs[i];
    if(i===0) ctx.moveTo(s.x,s.y);
    else ctx.lineTo(s.x,s.y);
  }
  ctx.strokeStyle = "#4285f4";
  ctx.lineWidth = 2;
  ctx.stroke();

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
